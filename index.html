<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="screen-orientation" content="portrait">
  <title>消防設備点検アプリ</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden;
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
    }
    input, textarea, select {
      -webkit-user-select: auto; user-select: auto;
      -webkit-touch-callout: default;
    }
    /* ここにあなたの元の全スタイルを貼り付けてください（前のバージョンと同じもの） */
    h1 { font-size: 20px; padding: 20px 20px 0; }
    button { font-size: 16px; padding: 8px 20px; margin-top: 10px; cursor: pointer; }
    /* ... あなたの元のstyle全部をここに入れてください ... */
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { 
      getAuth, 
      GoogleAuthProvider, 
      signInWithRedirect, 
      getRedirectResult,
      onAuthStateChanged, 
      signOut 
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDSJMRrFx5FtkYjjIhV_FopeqilWa6854U",
      authDomain: "manchestar-test.firebaseapp.com",
      projectId: "manchestar-test",
      storageBucket: "manchestar-test.firebasestorage.app",
      messagingSenderId: "863412425540",
      appId: "1:863412425540:web:9f7f5af93b89417132bd11"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // ==================== デバッグログ ====================
    let debugLogs = JSON.parse(localStorage.getItem('debugLogs') || '[]');

    function addDebugLog(message, data = null) {
      const now = new Date().toLocaleTimeString('ja-JP', { hour12: false });
      let logText = `[${now}] ${message}`;
      if (data !== null) {
        try {
          logText += ` → ${typeof data === 'object' ? JSON.stringify(data) : String(data)}`;
        } catch(e) {
          logText += ` → ${String(data)}`;
        }
      }
      debugLogs.unshift(logText);
      if (debugLogs.length > 200) debugLogs.pop();
      localStorage.setItem('debugLogs', JSON.stringify(debugLogs));
      renderDebugPanel();
    }

    function renderDebugPanel() {
      const panel = document.getElementById('debugPanel');
      const logDiv = document.getElementById('debugLog');
      if (!panel || !logDiv) return;
      logDiv.innerHTML = debugLogs.map(log => `<div>${log.replace(/</g, '&lt;')}</div>`).join('');
      panel.style.display = 'block';
    }
    // ========================================================

    window.loginWithGoogle = async function() {
      const loadingEl = document.getElementById('loginLoading');
      const errorEl = document.getElementById('loginError');
      errorEl.textContent = '';
      loadingEl.textContent = 'Googleへ移動中...';

      addDebugLog("🔄 signInWithRedirect 呼び出し", window.location.href);

      try {
        await signInWithRedirect(auth, provider);
      } catch (error) {
        addDebugLog("❌ signInWithRedirect エラー", error.message);
        loadingEl.textContent = '';
        errorEl.textContent = 'エラー: ' + error.message;
      }
    };

    window.logoutUser = function() {
      signOut(auth).catch(console.error);
    };

    async function handleRedirectResult() {
      try {
        const result = await getRedirectResult(auth);
        if (result && result.user) {
          addDebugLog("✅ getRedirectResult 成功！", { email: result.user.email });
        } else {
          addDebugLog("ℹ️ getRedirectResult は null");
        }
      } catch (error) {
        addDebugLog("❌ getRedirectResult エラー", error.message);
      }
    }

    // 認証状態監視（画面表示を強制的に制御）
    onAuthStateChanged(auth, (user) => {
      addDebugLog("🔄 onAuthStateChanged 発火", { loggedIn: !!user, email: user?.email || null });
      
      // デバッグ中：画面を強制的に制御
      document.getElementById('welcomeScreen').classList.remove('active');
      
      if (user) {
        document.getElementById('loginScreen').classList.remove('active');
        window.currentUser = user;
      } else {
        document.getElementById('loginScreen').classList.add('active');
        window.currentUser = null;
      }
    });

    window.addEventListener('load', () => {
      renderDebugPanel();
      addDebugLog("🚀 ページ読み込み完了", { url: window.location.href });
      handleRedirectResult();
    });
  </script>
</head>
<body>

  <!-- ==================== デバッグパネル ==================== -->
  <div id="debugPanel" style="display:none; position:fixed; top:0; left:0; right:0; background:#111; color:#0f0; font-family:monospace; font-size:13px; padding:8px; z-index:99999; max-height:50vh; overflow-y:auto; border-bottom:3px solid #0f0;">
    <div style="color:#ff0; margin-bottom:8px; font-weight:bold;">【ManCHEStar デバッグログ】</div>
    <div id="debugLog"></div>
  </div>
  <!-- ==================================================== -->

  <div id="welcomeScreen" class="active">
    <!-- あなたの元のwelcomeScreen内容をここにそのまま貼り付けてください -->
  </div>

  <div id="loginScreen">
    <!-- あなたの元のloginScreen内容（Googleボタン付き）をここにそのまま -->
  </div>

  <!-- ここからあなたの元の残りのHTML全部（mc-logo-h, setup, table-wrap など）を貼り付けてください -->

  <script>
    // あなたの元の全JavaScriptをここに貼り付けてください

    // popstate対策を無効化（現在テスト中）
    // history.pushState(...);
    // window.addEventListener('popstate', ...);

    // checkMobileも強制的にloginScreenを表示
    function checkMobile() {
      document.getElementById('welcomeScreen').classList.remove('active');
      document.getElementById('loginScreen').classList.add('active');
    }

    function closeWelcome() {
      document.getElementById('welcomeScreen').classList.remove('active');
      document.getElementById('loginScreen').classList.add('active');
    }
  </script>
</body>
</html>
