<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="screen-orientation" content="portrait">
  <title>消防設備点検アプリ</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; -webkit-user-select: none; user-select: none; }
    input, textarea, select { -webkit-user-select: auto; user-select: auto; }
    /* ==================== あなたの元の全スタイルをここに貼り付けてください ==================== */
    /* （前のバージョンから全部コピーして貼ってください） */
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { 
      getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult,
      onAuthStateChanged, signOut 
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDSJMRrFx5FtkYjjIhV_FopeqilWa6854U",
      authDomain: "manchestar-test.firebaseapp.com",
      projectId: "manchestar-test",
      storageBucket: "manchestar-test.firebasestorage.app",
      messagingSenderId: "863412425540",
      appId: "1:863412425540:web:9f7f5af93b89417132bd11"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // ==================== デバッグログ ====================
    let debugLogs = JSON.parse(localStorage.getItem('debugLogs') || '[]');

    function addDebugLog(message, data = null) {
      const now = new Date().toLocaleTimeString('ja-JP', { hour12: false });
      let logText = `[${now}] ${message}`;
      if (data) logText += ` → ${typeof data === 'object' ? JSON.stringify(data) : String(data)}`;
      debugLogs.unshift(logText);
      if (debugLogs.length > 200) debugLogs.pop();
      localStorage.setItem('debugLogs', JSON.stringify(debugLogs));
      renderDebugPanel();
    }

    function renderDebugPanel() {
      const panel = document.getElementById('debugPanel');
      const logDiv = document.getElementById('debugLog');
      if (panel && logDiv) {
        logDiv.innerHTML = debugLogs.map(log => `<div>${log.replace(/</g, '&lt;')}</div>`).join('');
        panel.style.display = 'block';
      }
    }
    // ========================================================

    window.loginWithGoogle = async function() {
      addDebugLog("🔄 signInWithRedirect 呼び出し");
      const loadingEl = document.getElementById('loginLoading');
      if (loadingEl) loadingEl.textContent = 'Googleへ移動中...';
      try {
        await signInWithRedirect(auth, provider);
      } catch (error) {
        addDebugLog("❌ signInWithRedirect エラー", error.message);
      }
    };

    function showLoginScreen() {
      document.getElementById('welcomeScreen').classList.remove('active');
      document.getElementById('loginScreen').classList.add('active');
    }

    function hideLoginScreens() {
      document.getElementById('welcomeScreen').classList.remove('active');
      document.getElementById('loginScreen').classList.remove('active');
    }

    onAuthStateChanged(auth, (user) => {
      addDebugLog("🔄 onAuthStateChanged", { loggedIn: !!user });
      if (user) {
        hideLoginScreens();
      } else {
        showLoginScreen();
      }
    });

    window.addEventListener('load', () => {
      renderDebugPanel();
      addDebugLog("🚀 ページ読み込み完了");
      setTimeout(showLoginScreen, 300);   // 強制的にログイン画面を表示
    });
  </script>
</head>
<body>

  <!-- デバッグパネル -->
  <div id="debugPanel" style="display:none; position:fixed; top:0; left:0; right:0; background:#111; color:#0f0; font-family:monospace; font-size:13px; padding:8px; z-index:99999; max-height:50vh; overflow-y:auto; border-bottom:3px solid #0f0;">
    <div style="color:#ff0; font-weight:bold;">【ManCHEStar デバッグログ】</div>
    <div id="debugLog"></div>
  </div>

  <!-- welcomeScreen -->
  <div id="welcomeScreen">
    <!-- あなたの元のwelcomeScreenの内容をここにそのまま貼り付けてください -->
  </div>

  <!-- loginScreen -->
  <div id="loginScreen">
    <!-- あなたの元のloginScreenの内容（Googleボタン付き）をここにそのまま貼り付けてください -->
  </div>

  <!-- ここからあなたの残りの全HTML（ロゴ、setupエリア、tableなど）を貼り付けてください -->

  <script>
    // ==================== あなたの元の全JavaScriptをここに貼り付けてください ====================
    // popstate対策は現在コメントアウトしています
  </script>
</body>
</html>
