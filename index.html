<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="screen-orientation" content="portrait">
  <title>消防設備点検アプリ</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
    /* ==================== ここにあなたの元の全スタイルを貼り付けてください ==================== */
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDSJMRrFx5FtkYjjIhV_FopeqilWa6854U",
      authDomain: "manchestar-test.firebaseapp.com",
      projectId: "manchestar-test",
      storageBucket: "manchestar-test.firebasestorage.app",
      messagingSenderId: "863412425540",
      appId: "1:863412425540:web:9f7f5af93b89417132bd11"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // デバッグログ
    let debugLogs = [];
    function addDebugLog(msg, data) {
      const time = new Date().toLocaleTimeString('ja-JP');
      let text = `[${time}] ${msg}`;
      if (data) text += ` → ${JSON.stringify(data)}`;
      debugLogs.unshift(text);
      if (debugLogs.length > 100) debugLogs.pop();
      renderDebug();
    }
    function renderDebug() {
      const el = document.getElementById('debugLog');
      if (el) el.innerHTML = debugLogs.map(l => `<div>${l}</div>`).join('');
    }

    window.loginWithGoogle = () => {
      addDebugLog("Googleログイン開始");
      signInWithRedirect(auth, provider);
    };

    onAuthStateChanged(auth, (user) => {
      addDebugLog("認証状態変更", { loggedIn: !!user });
      if (user) {
        document.getElementById('loginScreen').style.display = 'none';
      }
    });

    window.addEventListener('load', () => {
      addDebugLog("ページ読み込み完了");
      document.getElementById('debugPanel').style.display = 'block';
      
      // 強制的にログイン画面を表示
      document.getElementById('welcomeScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
    });
  </script>
</head>
<body>

  <!-- デバッグパネル -->
  <div id="debugPanel" style="display:none; position:fixed; top:0; left:0; right:0; background:#111; color:#0f0; font-family:monospace; font-size:13px; padding:10px; z-index:99999; max-height:40vh; overflow:auto;">
    <strong>【ManCHEStar デバッグログ】</strong><br>
    <div id="debugLog"></div>
  </div>

  <!-- welcomeScreen -->
  <div id="welcomeScreen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:10000; align-items:center; justify-content:center;">
    <!-- あなたのwelcomeScreenの内容 -->
  </div>

  <!-- loginScreen -->
  <div id="loginScreen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:10000; align-items:center; justify-content:center; flex-direction:column;">
    <h2>ログイン</h2>
    <button onclick="loginWithGoogle()" style="padding:15px 30px; font-size:18px;">Googleでログイン</button>
  </div>

  <!-- ここにあなたの残りのアプリ本体HTMLを全部貼り付けてください -->

  <script>
    // あなたの元のJavaScript全部をここに貼り付けてください
  </script>
</body>
</html>
