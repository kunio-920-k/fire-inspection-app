  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { 
      getAuth, 
      GoogleAuthProvider, 
      signInWithRedirect, 
      getRedirectResult,
      onAuthStateChanged, 
      signOut 
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDSJMRrFx5FtkYjjIhV_FopeqilWa6854U",
      authDomain: "manchestar-test.firebaseapp.com",
      projectId: "manchestar-test",
      storageBucket: "manchestar-test.firebasestorage.app",
      messagingSenderId: "863412425540",
      appId: "1:863412425540:web:9f7f5af93b89417132bd11"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // ==================== デバッグログ ====================
    let debugLogs = JSON.parse(localStorage.getItem('debugLogs') || '[]');

    function addDebugLog(message, data = null) {
      const now = new Date().toLocaleTimeString('ja-JP', { hour12: false });
      let logText = `[${now}] ${message}`;
      if (data !== null) {
        try {
          logText += ` → ${typeof data === 'object' ? JSON.stringify(data) : String(data)}`;
        } catch(e) {
          logText += ` → ${String(data)}`;
        }
      }
      debugLogs.unshift(logText);
      if (debugLogs.length > 200) debugLogs.pop();
      localStorage.setItem('debugLogs', JSON.stringify(debugLogs));
      renderDebugPanel();
    }

    function renderDebugPanel() {
      const panel = document.getElementById('debugPanel');
      const logDiv = document.getElementById('debugLog');
      if (panel && logDiv) {
        logDiv.innerHTML = debugLogs.map(log => `<div>${log.replace(/</g, '&lt;')}</div>`).join('');
        panel.style.display = 'block';
      }
    }
    // ========================================================

    window.loginWithGoogle = async function() {
      const loadingEl = document.getElementById('loginLoading');
      const errorEl = document.getElementById('loginError');
      if (loadingEl) loadingEl.textContent = 'Googleへ移動中...';
      if (errorEl) errorEl.textContent = '';

      addDebugLog("🔄 signInWithRedirect 呼び出し");

      try {
        await signInWithRedirect(auth, provider);
      } catch (error) {
        addDebugLog("❌ signInWithRedirect エラー", error.message);
        if (loadingEl) loadingEl.textContent = '';
        if (errorEl) errorEl.textContent = 'エラー: ' + error.message;
      }
    };

    window.logoutUser = function() {
      signOut(auth).catch(console.error);
    };

    async function handleRedirectResult() {
      try {
        const result = await getRedirectResult(auth);
        if (result && result.user) {
          addDebugLog("✅ getRedirectResult 成功！", { email: result.user.email });
        } else {
          addDebugLog("ℹ️ getRedirectResult は null");
        }
      } catch (error) {
        addDebugLog("❌ getRedirectResult エラー", error.message);
      }
    }

    onAuthStateChanged(auth, (user) => {
      addDebugLog("🔄 onAuthStateChanged", { loggedIn: !!user, email: user?.email || null });
      if (user) {
        document.getElementById('loginScreen').classList.remove('active');
        window.currentUser = user;
      } else {
        window.currentUser = null;
        const welcomeActive = document.getElementById('welcomeScreen').classList.contains('active');
        if (!welcomeActive) {
          document.getElementById('loginScreen').classList.add('active');
        }
      }
    });

    window.addEventListener('load', () => {
      renderDebugPanel();
      addDebugLog("🚀 ページ読み込み完了");
      handleRedirectResult();
    });
  </script>
